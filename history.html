<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historikk</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Historikk</h1>
      <p class="subtitle">Tidligere og aktive måneder i eksperimentet</p>
    </div>
  </header>

  <main class="container">
    <section class="hero-card compact-hero">
      <div>
        <p class="eyebrow">Oversikt</p>
        <h2 id="history-active-month">Laster...</h2>
        <p class="muted" id="history-month-count">Antall måneder: –</p>
      </div>

      <div class="hero-stats">
        <div class="stat-box">
          <span>Aktiv måned</span>
          <strong id="history-active-label">–</strong>
        </div>
        <div class="stat-box">
          <span>Ferdige måneder</span>
          <strong id="history-completed-count">–</strong>
        </div>
        <div class="stat-box">
          <span>Tracking videre</span>
          <strong id="history-held-count">–</strong>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="section-header">
        <h2>Måneder</h2>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>

    <section class="links-section">
      <a class="nav-link" href="index.html">Tilbake til forsiden</a>
      <a class="nav-link" href="track-record.html">Se total track record</a>
    </section>
  </main>

  <script src="assets/js/history.js"></script>
</body>
</html>

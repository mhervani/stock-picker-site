name: Month rollover

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rollover:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run month rollover
        run: python scripts/rollover_month.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/monthly_history.json data/track_record.json
          git diff --cached --quiet || git commit -m "Month rollover"
          git push